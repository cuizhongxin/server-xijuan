# 微信小程序配置
wechat:
  miniprogram:
    app-id: wx8f7d0509e671ceb4
    app-secret: 1ebc1ec2418ba5527088d5cc013f694c
    # 微信API地址
    api:
      code2session: https://api.weixin.qq.com/sns/jscode2session
      token: https://api.weixin.qq.com/cgi-bin/token
      msgSecCheck: https://api.weixin.qq.com/wxa/msg_sec_check

# JWT配置
jwt:
  # JWT密钥（至少32字符/256bits）
  secret: xiaofanxingetest123456789abcdefghijk  # 32+ 字符的安全密钥
  expiration: 604800  # token过期时间（秒），7天

# 日志配置
logging:
  level:
    root: INFO
    com.miniprogram: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 玩家行为模拟（默认关闭，避免影响线上）
simulation:
  players:
    enabled: false
    cron: "0 */10 * * * ?"
    max-players-per-tick: 30
    include-war-modules: true
    activity-profile: medium
    # 区服权重格式: "1:1.5,2:0.8,3:2.0"
    server-weights: ""
    # 模拟配置接口免登录密钥（请求头 X-Sim-Key）；为空则必须登录管理员
    admin-key: ""

# 通用免登录管理接口密钥（请求头 X-Admin-Key）
admin:
  open-api-key: ""

ugc:
  moderation:
    enabled: true
    # 是否启用微信官方内容安全接口二次校验（建议线上开启）
    wechat-enabled: true
    # 微信接口失败时是否放行。true=放行（推荐防止误杀）；false=拦截（更严格）
    wechat-fail-open: true
    # 用英文逗号分隔。建议在云托管环境变量里覆盖配置。
    blocked-keywords: "习进平,习尽贫,xi尽贫"
    name-mask: "合规玩家"
    content-mask: "[内容已屏蔽]"


